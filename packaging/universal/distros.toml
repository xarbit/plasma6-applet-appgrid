#
# Per-distro runtime dependencies for the AppGrid universal package.
# install.py picks a table by matching /etc/os-release ID / VARIANT_ID
# against `aliases` (exact) and `prefixes` (startswith).
#
# Schema: aliases[], prefixes[], display, packages[], install, notes.

[arch]
aliases  = ["arch", "manjaro", "endeavouros", "cachyos", "garuda"]
display  = "Arch / Arch-derivative"
packages = [
    "qt6-base", "qt6-declarative",
    "libplasma", "kpackage", "kio", "kservice", "ki18n",
    "kcoreaddons", "kwindowsystem", "krunner", "kirigami",
    "layer-shell-qt", "plasma-activities", "plasma-workspace",
]
install  = "sudo pacman -S --needed {packages}"

[fedora]
aliases  = ["fedora", "nobara"]
display  = "Fedora"
packages = [
    "qt6-qtbase", "qt6-qtdeclarative",
    "libplasma", "kf6-kpackage", "kf6-kio", "kf6-kservice", "kf6-ki18n",
    "kf6-kcoreaddons", "kf6-kwindowsystem", "kf6-krunner", "kf6-kirigami",
    "layer-shell-qt", "plasma-activities", "plasma-workspace",
]
install  = "sudo dnf install {packages}"

[openmandriva]
aliases  = ["openmandriva"]
display  = "OpenMandriva Lx"
# lib64-prefixed Qt6/Plasma runtime libs (multilib), kf6-* like Fedora.
packages = [
    "lib64Qt6Core", "lib64Qt6Gui", "lib64Qt6Quick", "lib64Qt6Qml",
    "lib64Qt6Network", "lib64Qt6DBus",
    "lib64Plasma", "lib64PlasmaActivities",
    "kf6-kpackage", "kf6-kio", "kf6-kservice", "kf6-ki18n",
    "kf6-kcoreaddons", "kf6-kwindowsystem", "kf6-krunner", "kf6-kirigami",
    "layer-shell-qt", "plasma-workspace",
]
install  = "sudo dnf install {packages}"

[debian]
aliases  = ["debian", "ubuntu", "linuxmint", "pop", "kali"]
display  = "Debian / Ubuntu"
# Qt6 carries the t64 suffix (64-bit time_t transition) on Debian 13+.
packages = [
    "libqt6core6t64", "libqt6gui6", "libqt6quick6", "libqt6qml6",
    "libqt6network6t64", "libqt6dbus6",
    "libplasma6", "libkf6package6",
    "libkf6kiocore6", "libkf6kiogui6", "libkf6kiofilewidgets6",
    "libkf6service6", "libkf6i18n6", "libkf6coreaddons6",
    "libkf6windowsystem6", "libkf6runner6",
    "qml6-module-org-kde-kirigami",
    "liblayershellqtinterface6", "libplasmaactivities6",
    "plasma-workspace",
]
install  = "sudo apt install {packages}"

[suse]
aliases  = ["opensuse-tumbleweed", "opensuse-leap"]
display  = "openSUSE / SUSE"
# Runtime libs named by SONAME (libPlasma7); layer-shell-qt has -qt6 suffix.
packages = [
    "libQt6Core6", "libQt6Gui6", "libQt6Quick6", "libQt6Qml6",
    "libQt6Network6", "libQt6DBus6",
    "libPlasma7", "libPlasmaActivities7",
    "kf6-kpackage", "kf6-kio", "kf6-kservice", "kf6-ki18n",
    "kf6-kcoreaddons", "kf6-kwindowsystem", "kf6-krunner", "kf6-kirigami",
    "layer-shell-qt6", "plasma6-workspace",
]
install  = "sudo zypper install {packages}"

# --- Immutable distros ---------------------------------------------------
# All base images ship Plasma 6 + KF6 already; no install command needed.

[kde-linux]
aliases  = ["kde-linux"]
display  = "KDE Linux"
packages = []
notes    = "KDE Linux ships Plasma 6 + Qt 6 + KF6 in the base image. No package install needed."

[kinoite]
aliases  = ["kinoite"]
display  = "Fedora Kinoite"
packages = []
notes    = "Fedora Kinoite is immutable (rpm-ostree). System changes need `rpm-ostree install` + reboot; AppGrid installs under ~/.local/ instead."

[aurora]
aliases  = ["aurora"]
prefixes = ["aurora-"]
display  = "Aurora (uBlue)"
packages = []
notes    = "Aurora is immutable (rpm-ostree). AppGrid installs under ~/.local/ — no layered packages needed."

[bazzite]
aliases  = ["bazzite"]
prefixes = ["bazzite-"]
display  = "Bazzite"
packages = []
notes    = "Bazzite is immutable (rpm-ostree). AppGrid installs under ~/.local/ — no layered packages needed. GNOME variants fail plasma_present() at install time."

[kalpa]
aliases  = ["kalpa-desktop", "opensuse-kalpa", "kalpa"]
display  = "openSUSE Kalpa"
packages = []
notes    = "openSUSE Kalpa is immutable (transactional-update). AppGrid installs under ~/.local/ — no system changes needed."

[steamos]
aliases  = ["steamos"]
display  = "SteamOS"
packages = []
notes    = "SteamOS Deck Desktop Mode has /usr read-only and reverts pacman changes on each system update. ~/.local/ install survives updates."

# --- Fallback ------------------------------------------------------------

[generic]
display  = "Unknown distro"
packages = [
    "qt6-base", "qt6-declarative",
    "plasma", "kpackage", "kio", "kservice", "ki18n",
    "kcoreaddons", "kwindowsystem", "krunner", "kirigami",
    "layer-shell-qt", "plasma-activities", "plasma-workspace",
]
