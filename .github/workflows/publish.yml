#
# Reusable publish workflow. Uploads a source package to the Launchpad PPA
# and an SRPM to Fedora COPR; both services then build the binaries for
# every series and architecture. Called by release.yml (stable / rc tags)
# and build.yml (dev builds from main).
#
# Channel -> project name:
#   stable -> plasma-applet-appgrid
#   rc     -> plasma-applet-appgrid-rc
#   dev    -> plasma-applet-appgrid-dev

name: Publish

on:
  workflow_call:
    inputs:
      channel:
        description: "stable | rc | dev"
        required: true
        type: string
      version:
        description: "Full version, e.g. 1.8.0 / 1.8.0-rc.1 / 1.8.0-dev.42"
        required: true
        type: string
      pkg_version:
        description: "Packaging-safe version, e.g. 1.8.0 / 1.8.0~rc.1"
        required: true
        type: string
    secrets:
      COPR_CONFIG:
        required: true
      LAUNCHPAD_GPG_KEY:
        required: true
      AUR_SSH_KEY:
        required: false

jobs:
  copr:
    name: COPR (${{ inputs.channel }})
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install tooling
        run: dnf install -y --setopt=install_weak_deps=False copr-cli rpm-build git-core tar gettext

      - name: Checkout
        uses: actions/checkout@v5

      - name: Mark workspace safe (container uid mismatch)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Configure copr-cli
        run: |
          mkdir -p ~/.config
          printf '%s' "${{ secrets.COPR_CONFIG }}" > ~/.config/copr

      - name: Build SRPM
        env:
          APP_VERSION: ${{ inputs.version }}
          PKG_VERSION: ${{ inputs.pkg_version }}
        run: |
          set -e
          export CHANGELOG_DATE="$(date '+%a %b %d %Y')"
          envsubst '$APP_VERSION $PKG_VERSION $CHANGELOG_DATE' \
            < packaging/rpm/appgrid.spec.in > appgrid.spec
          git archive --format=tar.gz \
            --prefix="plasma-applet-appgrid-${PKG_VERSION}/" \
            -o "plasma-applet-appgrid-${PKG_VERSION}.tar.gz" HEAD
          rpmbuild -bs appgrid.spec \
            --define "_sourcedir $PWD" \
            --define "_srcrpmdir $PWD"
          ls -la ./*.src.rpm

      - name: Submit to COPR
        run: |
          set -e
          case "${{ inputs.channel }}" in
            stable) PROJECT=scujas/plasma-applet-appgrid ;;
            rc)     PROJECT=scujas/plasma-applet-appgrid-rc ;;
            dev)    PROJECT=scujas/plasma-applet-appgrid-dev ;;
            *) echo "::error::unknown channel ${{ inputs.channel }}"; exit 1 ;;
          esac
          copr-cli build --nowait "$PROJECT" ./*.src.rpm

  launchpad:
    name: Launchpad ${{ matrix.series.codename }} (${{ inputs.channel }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        series:
          # 24.04 LTS (noble) is omitted — it ships Plasma 5.27; AppGrid
          # needs Plasma 6, first available on Ubuntu in 24.10.
          - { codename: questing, ver: "25.10" }
          - { codename: resolute, ver: "26.04" }
          - { codename: stonking, ver: "26.10" }
    steps:
      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            devscripts dput dpkg-dev debhelper libdistro-info-perl

      - name: Checkout
        uses: actions/checkout@v5

      - name: Import signing key
        run: |
          printf '%s' "${{ secrets.LAUNCHPAD_GPG_KEY }}" | gpg --batch --import
          if ! gpg --list-secret-keys --with-colons | grep -q '^sec:'; then
            echo "::error::LAUNCHPAD_GPG_KEY holds no secret key — re-export it with 'gpg --armor --export-secret-keys <KEYID>' and update the secret"
            exit 1
          fi

      - name: Build and upload source package
        env:
          DEBEMAIL: code@xarbit.dev
          DEBFULLNAME: AppGrid CI
        run: |
          set -e
          case "${{ inputs.channel }}" in
            stable) PPA=ppa:xarbit/plasma-applet-appgrid ;;
            rc)     PPA=ppa:xarbit/plasma-applet-appgrid-rc ;;
            dev)    PPA=ppa:xarbit/plasma-applet-appgrid-dev ;;
            *) echo "::error::unknown channel ${{ inputs.channel }}"; exit 1 ;;
          esac
          # dpkg-buildpackage needs debian/ at the source-tree root.
          mv packaging/deb/debian debian
          # ~<series> keeps each per-series upload distinct and correctly
          # ordered; native source format -> no Debian revision.
          DEB_VERSION="${{ inputs.pkg_version }}~${{ matrix.series.ver }}"
          rm -f debian/changelog
          dch --create --package plasma-applet-appgrid \
              --newversion "$DEB_VERSION" \
              --distribution "${{ matrix.series.codename }}" --force-distribution \
              "Automated ${{ inputs.channel }} build of ${{ inputs.version }}."
          # Native source package — drop the VCS dir so it stays out of the tarball.
          rm -rf .git
          dpkg-buildpackage -S -d
          dput "$PPA" "../plasma-applet-appgrid_${DEB_VERSION}_source.changes"

  aur:
    name: AUR (${{ inputs.channel }})
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install tooling
        run: pacman -Syu --noconfirm --needed git openssh sudo gettext curl

      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Full history — the dev (-git) channel derives its version
          # from `git rev-list --count`.
          fetch-depth: 0

      - name: Render PKGBUILD and .SRCINFO
        run: |
          set -e
          REPO="https://github.com/xarbit/plasma6-applet-appgrid"
          # Channel -> AUR package: stable + rc track a release tag; dev is
          # the -git VCS package (static recipe, version resolved on build).
          case "${{ inputs.channel }}" in
            stable)
              echo "aur_pkg=plasma6-applets-appgrid" >> "$GITHUB_ENV"
              export PKGVER="${{ inputs.version }}"
              export SHA256="$(curl -fsSL "$REPO/archive/refs/tags/v${PKGVER}.tar.gz" | sha256sum | cut -d' ' -f1)"
              envsubst '$PKGVER $SHA256' < packaging/aur/PKGBUILD.in > PKGBUILD
              ;;
            rc)
              echo "aur_pkg=plasma6-applets-appgrid-rc" >> "$GITHUB_ENV"
              export TAG="v${{ inputs.version }}"
              export PKGVER="$(echo '${{ inputs.version }}' | sed 's/-/_/g; s/+.*//')"
              export SHA256="$(curl -fsSL "$REPO/archive/refs/tags/${TAG}.tar.gz" | sha256sum | cut -d' ' -f1)"
              envsubst '$PKGVER $TAG $SHA256' < packaging/aur/PKGBUILD-rc.in > PKGBUILD
              ;;
            dev)
              echo "aur_pkg=plasma6-applets-appgrid-git" >> "$GITHUB_ENV"
              git config --global --add safe.directory "$GITHUB_WORKSPACE"
              # Same version pkgver() computes at build time, baked in so
              # the AUR page shows it: base.r<commit-count>.g<short-sha>.
              BASE="$(grep -oP 'project\(AppGrid VERSION \K[0-9.]+' CMakeLists.txt)"
              export PKGVER="${BASE}.r$(git rev-list --count HEAD).g$(git rev-parse --short HEAD)"
              envsubst '$PKGVER' < packaging/aur/PKGBUILD-git.in > PKGBUILD
              ;;
            *) echo "::error::unknown channel ${{ inputs.channel }}"; exit 1 ;;
          esac
          # The post-upgrade .install hook is shared by all channels and must
          # ship in the AUR repo (every PKGBUILD references it via install=).
          cp packaging/aur/plasma6-applets-appgrid.install .
          # makepkg (incl. --printsrcinfo) refuses to run as root.
          useradd -m builder
          install -o builder -g builder PKGBUILD /home/builder/PKGBUILD
          install -o builder -g builder plasma6-applets-appgrid.install /home/builder/plasma6-applets-appgrid.install
          sudo -u builder bash -c 'cd /home/builder && makepkg --printsrcinfo' > .SRCINFO
          echo "=== PKGBUILD ===" && cat PKGBUILD
          echo "=== .SRCINFO ===" && cat .SRCINFO

      - name: Publish to the AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          set -e
          mkdir -p ~/.ssh
          printf '%s\n' "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          # accept-new: trust AUR's host key on first connect, then pin it.
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/aur -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
          git config --global user.name "AppGrid CI"
          git config --global user.email "code@xarbit.dev"
          # Cloning a not-yet-existing AUR package returns an empty repo —
          # the first push then creates it under the key owner's account.
          git clone "ssh://aur@aur.archlinux.org/${aur_pkg}.git" aur-pkg
          cp PKGBUILD .SRCINFO plasma6-applets-appgrid.install aur-pkg/
          cd aur-pkg
          git add PKGBUILD .SRCINFO plasma6-applets-appgrid.install
          if git diff --cached --quiet; then
            echo "${aur_pkg}: already up to date."
          else
            git commit -m "Update to ${{ inputs.version }}"
            # The AUR only accepts pushes to master.
            git push origin HEAD:master
          fi
