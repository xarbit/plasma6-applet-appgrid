name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  BUILD_TYPE: Release

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      # Raw tag version (e.g. "1.8.0" or "1.8.0-rc.1") — fed to
      # APPGRID_VERSION_OVERRIDE so the binary self-reports the exact tag,
      # and to the universal tarball filename (which has no version-field
      # constraints). Keep the hyphen here.
      version: ${{ steps.version.outputs.version }}
      # RPM / Debian-safe pre-release version. RPM's Version: field forbids
      # hyphens; Debian convention sorts "1.8.0~rc.1" BEFORE "1.8.0" final.
      # Stable tags pass through unchanged ("1.8.0" → "1.8.0"); pre-release
      # tags swap "-" for "~" ("1.8.0-rc.1" → "1.8.0~rc.1") and drop the
      # "+<build>" suffix that semver allows but neither RPM nor Debian do.
      pkg_version: ${{ steps.version.outputs.pkg_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Determine version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(echo "$VERSION" | sed 's/-/~/g; s/+.*//')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "pkg_version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved: tag=v${VERSION}  rpm/deb pkg_version=${PKG_VERSION}"

  tests:
    name: Tests
    needs: version
    runs-on: ubuntu-latest
    container: archlinux:latest
    env:
      APP_VERSION: ${{ needs.version.outputs.version }}
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            base-devel git cmake extra-cmake-modules \
            qt6-base qt6-declarative \
            libplasma kpackage kio kservice ki18n \
            kcoreaddons kwindowsystem krunner layer-shell-qt plasma-activities \
            plasma-workspace

      - name: Checkout
        uses: actions/checkout@v5

      - name: Mark workspace as safe (container uid mismatch)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build with tests + universal flag
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DBUILD_TESTING=ON -DAPPGRID_UNIVERSAL_BUILD=ON \
            -DAPPGRID_VERSION_OVERRIDE="$APP_VERSION"
          cmake --build build -j$(nproc)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  arch:
    name: Arch Linux
    needs: [version, tests]
    runs-on: ubuntu-latest
    container: archlinux:latest
    env:
      APP_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            base-devel git sudo \
            cmake extra-cmake-modules \
            qt6-base qt6-declarative \
            libplasma kpackage kio kservice ki18n kiconthemes kirigami \
            kcoreaddons kwindowsystem krunner layer-shell-qt plasma-activities \
            plasma-workspace gettext

      - name: Checkout
        uses: actions/checkout@v5

      # makepkg refuses to run as root — make a regular user for the build.
      - name: Create builder user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder .

      - name: Package via makepkg
        run: |
          # Render PKGBUILD from PKGBUILD.in via envsubst, same pattern
          # the .rpm/.deb specs use. PKG_VERSION must be pacman-safe
          # (no '-' or '+'); APP_VERSION keeps the full string so the
          # binary's self-reported version still matches the release tag.
          export PKG_VERSION=$(echo "$APP_VERSION" | sed 's/-/_/g; s/+.*//')
          export PKG_RELEASE=1
          export APP_VERSION
          # Restrict envsubst to OUR placeholders only — without the
          # variable list it would also expand $startdir / $pkgdir
          # (referenced inside PKGBUILD's build() / package() functions)
          # to empty strings at render time, breaking the build.
          envsubst '$PKG_VERSION $PKG_RELEASE $APP_VERSION' \
            < packages/buildpkg/PKGBUILD.in > ./PKGBUILD
          chown -R builder:builder .
          sudo -u builder makepkg --noconfirm --skipinteg --syncdeps --rmdeps
          ls -la *.pkg.tar.zst

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: arch-package
          path: plasma6-applets-appgrid-*.pkg.tar.zst

  fedora:
    name: Fedora (${{ matrix.arch }})
    needs: [version, tests]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    env:
      APP_VERSION: ${{ needs.version.outputs.version }}
      PKG_VERSION: ${{ needs.version.outputs.pkg_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build and package
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v ${{ github.workspace }}:/workspace \
            -e APP_VERSION="${APP_VERSION}" \
            -e PKG_VERSION="${PKG_VERSION}" \
            -e BUILD_TYPE="${BUILD_TYPE}" \
            fedora:latest bash -c '
              set -e
              dnf install -y \
                cmake extra-cmake-modules gcc-c++ \
                qt6-qtbase-devel qt6-qtdeclarative-devel \
                libplasma-devel kf6-kpackage-devel kf6-kio-devel \
                kf6-kservice-devel kf6-ki18n-devel kf6-kcoreaddons-devel \
                kf6-kiconthemes-devel \
                kf6-kwindowsystem-devel kf6-krunner-devel layer-shell-qt-devel \
                plasma-activities-devel plasma-workspace-devel \
                gettext rpm-build
              cd /workspace
              cmake -B build -DCMAKE_BUILD_TYPE=$BUILD_TYPE -DCMAKE_INSTALL_PREFIX=/usr \
                -DAPPGRID_VERSION_OVERRIDE="$APP_VERSION"
              cmake --build build -j$(nproc)
              DESTDIR="$PWD/pkg" cmake --install build
              export DISTRO_VER=$(rpm -E %fedora)
              export PKG_DIR="$PWD/pkg"
              # PKG_VERSION already comes in RPM-safe (no "-"); APP_VERSION
              # keeps the raw tag string for APPGRID_VERSION_OVERRIDE above.
              export PKG_VERSION
              envsubst < packages/rpm/fedora.spec.in > appgrid.spec
              rpmbuild -bb \
                --define "_topdir $PWD/rpmbuild" \
                appgrid.spec
              find rpmbuild/RPMS -name "*.rpm" -exec cp {} /workspace/ \;
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: fedora-package-${{ matrix.arch }}
          path: "*.rpm"

  deb-packages:
    name: ${{ matrix.distro.name }} (${{ matrix.arch.name }})
    needs: [version, tests]
    runs-on: ${{ matrix.arch.runner }}
    strategy:
      fail-fast: false
      matrix:
        distro:
          - { name: "Ubuntu 25.04", image: "ubuntu:25.04", id: "ubuntu-25.04" }
          - { name: "Ubuntu 25.10", image: "ubuntu:25.10", id: "ubuntu-25.10" }
          - { name: "Ubuntu 26.04", image: "ubuntu:26.04", id: "ubuntu-26.04" }
          - { name: "Debian 13", image: "debian:13", id: "debian-13" }
        arch:
          - { name: "x86_64", runner: "ubuntu-latest", platform: "linux/amd64", deb: "amd64" }
          - { name: "aarch64", runner: "ubuntu-24.04-arm", platform: "linux/arm64", deb: "arm64" }
    env:
      APP_VERSION: ${{ needs.version.outputs.version }}
      PKG_VERSION: ${{ needs.version.outputs.pkg_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build and package
        env:
          DEB_ARCH: ${{ matrix.arch.deb }}
        run: |
          docker run --rm --platform ${{ matrix.arch.platform }} \
            -v ${{ github.workspace }}:/workspace \
            -e APP_VERSION="${APP_VERSION}" \
            -e PKG_VERSION="${PKG_VERSION}" \
            -e BUILD_TYPE="${BUILD_TYPE}" \
            -e DEB_ARCH="${DEB_ARCH}" \
            -e DEBIAN_FRONTEND=noninteractive \
            ${{ matrix.distro.image }} bash -c '
              set -e
              apt-get update
              apt-get install -y \
                cmake extra-cmake-modules g++ \
                qt6-base-dev qt6-declarative-dev \
                libplasma-dev libkf6package-dev libkf6kio-dev \
                libkf6service-dev libkf6i18n-dev libkf6coreaddons-dev \
                libkf6iconthemes-dev \
                libkf6windowsystem-dev libkf6runner-dev \
                libplasmaactivities-dev \
                liblayershellqtinterface-dev \
                plasma-workspace-dev \
                gettext dpkg-dev
              cd /workspace
              cmake -B build -DCMAKE_BUILD_TYPE=$BUILD_TYPE -DCMAKE_INSTALL_PREFIX=/usr \
                -DAPPGRID_VERSION_OVERRIDE="$APP_VERSION"
              cmake --build build -j$(nproc)
              DESTDIR="$PWD/pkg" cmake --install build
              mkdir -p pkg/DEBIAN
              DISTRO_ID=$(grep -oP "^ID=\K\w+" /etc/os-release)
              VER_ID=$(grep -oP "VERSION_ID=\"\K[^\"]+" /etc/os-release)
              CODENAME=$(grep -oP "VERSION_CODENAME=\K.*" /etc/os-release)
              # Use the deb-safe PKG_VERSION (with "~" for pre-releases) so
              # 1.8.0~rc.1 sorts BEFORE 1.8.0 final per dpkg --compare-versions.
              if [ "$DISTRO_ID" = "ubuntu" ]; then
                export PKG_SUFFIX="${PKG_VERSION}-1ubuntu${VER_ID}"
              else
                export PKG_SUFFIX="${PKG_VERSION}-1${DISTRO_ID}${VER_ID}"
              fi
              export DEB_ARCH
              envsubst < packages/deb/control.in > pkg/DEBIAN/control
              dpkg-deb --build pkg \
                "/workspace/plasma-applet-appgrid_${PKG_SUFFIX}_${CODENAME}_${DEB_ARCH}.deb"
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.distro.id }}-package-${{ matrix.arch.deb }}
          path: "*.deb"

  universal:
    name: Universal package (${{ matrix.arch }})
    needs: [version, tests]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    env:
      APP_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build and package
        # Fedora 42 = oldest mainstream stable shipping Plasma libs at
        # SONAME 7 (KDE bumped from 6 around Plasma 6.4). Built here so the
        # tarball loads on KDE Linux / Kinoite / Bazzite / Aurora / Kalpa /
        # SteamOS / Arch / Tumbleweed. Excludes Plasma <= 6.3 users.
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v ${{ github.workspace }}:/workspace \
            -e APP_VERSION="${APP_VERSION}" \
            -e BUILD_TYPE="${BUILD_TYPE}" \
            -e ARCH="${{ matrix.arch }}" \
            fedora:42 bash -c '
              set -e
              dnf clean all
              dnf makecache --refresh
              dnf install -y \
                cmake extra-cmake-modules gcc-c++ make \
                qt6-qtbase-devel qt6-qtdeclarative-devel \
                libplasma-devel kf6-kpackage-devel kf6-kio-devel \
                kf6-kservice-devel kf6-ki18n-devel kf6-kcoreaddons-devel \
                kf6-kiconthemes-devel \
                kf6-kwindowsystem-devel kf6-krunner-devel layer-shell-qt-devel \
                plasma-activities-devel plasma-workspace-devel \
                gettext
              test -f /usr/lib64/cmake/Qt6/Qt6Config.cmake \
                || { echo "ERROR: qt6-qtbase-devel install incomplete"; rpm -V qt6-qtbase-devel; exit 1; }
              cd /workspace
              # Pin plugin path + explicit Qt6_DIR (see build.yml note).
              cmake -B build -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
                  -DAPPGRID_UNIVERSAL_BUILD=ON \
                  -DQt6_DIR=/usr/lib64/cmake/Qt6 \
                  -DCMAKE_PREFIX_PATH=/usr/lib64/cmake \
                  -DKDE_INSTALL_QTPLUGINDIR=lib/qt6/plugins \
                  -DAPPGRID_VERSION_OVERRIDE="$APP_VERSION"
              cmake --build build -j$(nproc)
              mkdir -p out
              bash packages/universal/build-package.sh \
                "$APP_VERSION" "$ARCH" build out
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: universal-package-${{ matrix.arch }}
          path: out/*

  nix:
    name: Nix flake build
    needs: [version, tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - name: Build flake
        run: nix build --print-build-logs .#default
      - name: Verify output
        # Nix's Qt6 plugin dir is lib/qt-6/ (hyphenated).
        run: |
          test -f result/lib/qt-6/plugins/plasma/applets/dev.xarbit.appgrid.so
          test -f result/lib/qt-6/plugins/plasma/applets/dev.xarbit.appgrid.panel.so

  release:
    name: Create Release
    needs: [version, arch, fedora, deb-packages, universal, nix]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: List packages
        run: find artifacts -type f | sort

      # Generate SHA256 sidecars next to every .rpm and .deb so the website
      # (and end users) can verify downloads. Universal already ships its
      # own .tar.gz.sha256 via build-package.sh, so we skip .tar.gz here.
      - name: Generate SHA256 sidecars for distro packages
        run: |
          set -e
          find artifacts -type f \( -name '*.rpm' -o -name '*.deb' -o -name '*.pkg.tar.zst' \) | while read -r f; do
            ( cd "$(dirname "$f")" && sha256sum "$(basename "$f")" > "$(basename "$f").sha256" )
          done
          echo "=== sidecars created ==="
          find artifacts -type f -name '*.sha256' | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          # Mark as pre-release when the tag is an rc / beta / alpha. The
          # website's stable / pre-release channel toggle keys off this flag
          # via GitHub's `prerelease` field.
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: |
            artifacts/*
