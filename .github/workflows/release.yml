name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  BUILD_TYPE: Release

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Determine version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  arch:
    name: Arch Linux
    needs: version
    runs-on: ubuntu-latest
    container: archlinux:latest
    env:
      APP_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            base-devel git cmake extra-cmake-modules \
            qt6-base qt6-declarative \
            libplasma kpackage kio kservice ki18n \
            kcoreaddons kwindowsystem krunner layer-shell-qt \
            plasma-workspace

      - name: Checkout
        uses: actions/checkout@v5

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=$BUILD_TYPE -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build -j$(nproc)

      - name: Package
        run: |
          DESTDIR="$PWD/pkg" cmake --install build
          cd pkg
          tar czf ../plasma6-applets-appgrid-${APP_VERSION}-1-arch-x86_64.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: arch-package
          path: plasma6-applets-appgrid-*.tar.gz

  fedora:
    name: Fedora (${{ matrix.arch }})
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    env:
      APP_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build and package
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v ${{ github.workspace }}:/workspace \
            -e APP_VERSION="${APP_VERSION}" \
            -e BUILD_TYPE="${BUILD_TYPE}" \
            fedora:latest bash -c '
              set -e
              dnf install -y \
                cmake extra-cmake-modules gcc-c++ \
                qt6-qtbase-devel qt6-qtdeclarative-devel \
                libplasma-devel kf6-kpackage-devel kf6-kio-devel \
                kf6-kservice-devel kf6-ki18n-devel kf6-kcoreaddons-devel \
                kf6-kwindowsystem-devel kf6-krunner-devel layer-shell-qt-devel \
                plasma-workspace-devel \
                gettext rpm-build
              cd /workspace
              cmake -B build -DCMAKE_BUILD_TYPE=$BUILD_TYPE -DCMAKE_INSTALL_PREFIX=/usr
              cmake --build build -j$(nproc)
              DESTDIR="$PWD/pkg" cmake --install build
              FEDORA_VER=$(rpm -E %fedora)
              PKG_DIR="$PWD/pkg"
              cat > appgrid.spec <<SPEC
          Name:           plasma-applet-appgrid
          Version:        ${APP_VERSION}
          Release:        1.fc${FEDORA_VER}
          Summary:        A modern fullscreen application launcher for KDE Plasma
          License:        GPL-2.0-or-later
          URL:            https://github.com/xarbit/plasma6-applet-appgrid
          Requires:       plasma-workspace plasma-desktop

          %description
          A modern fullscreen application launcher for KDE Plasma,
          inspired by macOS Launchpad and COSMIC.

          %install
          cp -a ${PKG_DIR}/* %{buildroot}/

          %files
          /usr/lib64/qt6/plugins/plasma/applets/dev.xarbit.appgrid.so
          /usr/lib64/qt6/plugins/plasma/applets/dev.xarbit.appgrid.panel.so
          /usr/share/plasma/plasmoids/dev.xarbit.appgrid/
          /usr/share/plasma/plasmoids/dev.xarbit.appgrid.panel/
          /usr/share/metainfo/dev.xarbit.appgrid.metainfo.xml
          /usr/share/locale/*/LC_MESSAGES/dev.xarbit.appgrid.mo
          SPEC
              rpmbuild -bb \
                --define "_topdir $PWD/rpmbuild" \
                appgrid.spec
              find rpmbuild/RPMS -name "*.rpm" -exec cp {} /workspace/ \;
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: fedora-package-${{ matrix.arch }}
          path: '*.rpm'

  deb-packages:
    name: ${{ matrix.distro.name }} (${{ matrix.arch.name }})
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - {name: "Ubuntu 25.04", image: "ubuntu:25.04", id: "ubuntu-25.04"}
          - {name: "Ubuntu 25.10", image: "ubuntu:25.10", id: "ubuntu-25.10"}
          - {name: "Ubuntu 26.04", image: "ubuntu:26.04", id: "ubuntu-26.04"}
          - {name: "Debian 13", image: "debian:13", id: "debian-13"}
        arch:
          - {name: "x86_64", platform: "linux/amd64", deb: "amd64"}
          - {name: "aarch64", platform: "linux/arm64", deb: "arm64"}
    env:
      APP_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        if: matrix.arch.name == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build and package
        env:
          DEB_ARCH: ${{ matrix.arch.deb }}
        run: |
          docker run --rm --platform ${{ matrix.arch.platform }} \
            -v ${{ github.workspace }}:/workspace \
            -e APP_VERSION="${APP_VERSION}" \
            -e BUILD_TYPE="${BUILD_TYPE}" \
            -e DEB_ARCH="${DEB_ARCH}" \
            -e DEBIAN_FRONTEND=noninteractive \
            ${{ matrix.distro.image }} bash -c '
              set -e
              apt-get update
              apt-get install -y \
                cmake extra-cmake-modules g++ \
                qt6-base-dev qt6-declarative-dev \
                libplasma-dev libkf6package-dev libkf6kio-dev \
                libkf6service-dev libkf6i18n-dev libkf6coreaddons-dev \
                libkf6windowsystem-dev libkf6runner-dev \
                liblayershellqtinterface-dev \
                plasma-workspace-dev \
                gettext dpkg-dev
              cd /workspace
              cmake -B build -DCMAKE_BUILD_TYPE=$BUILD_TYPE -DCMAKE_INSTALL_PREFIX=/usr
              cmake --build build -j$(nproc)
              DESTDIR="$PWD/pkg" cmake --install build
              mkdir -p pkg/DEBIAN
              DISTRO_ID=$(grep -oP "^ID=\K\w+" /etc/os-release)
              VER_ID=$(grep -oP "VERSION_ID=\"\K[^\"]+" /etc/os-release)
              CODENAME=$(grep -oP "VERSION_CODENAME=\K.*" /etc/os-release)
              if [ "$DISTRO_ID" = "ubuntu" ]; then
                PKG_SUFFIX="${APP_VERSION}-1ubuntu${VER_ID}"
              else
                PKG_SUFFIX="${APP_VERSION}-1${DISTRO_ID}${VER_ID}"
              fi
              cat > pkg/DEBIAN/control <<EOF
          Package: plasma-applet-appgrid
          Version: ${PKG_SUFFIX}
          Section: kde
          Priority: optional
          Architecture: ${DEB_ARCH}
          Depends: plasma-workspace, plasma-desktop, libkf6service6, libkf6i18n6
          Maintainer: Jason Scurtu <jscurtu@gmail.com>
          Description: A modern fullscreen application launcher for KDE Plasma
           A modern fullscreen application launcher for KDE Plasma,
           inspired by macOS Launchpad and COSMIC.
          Homepage: https://github.com/xarbit/plasma6-applet-appgrid
          EOF
              dpkg-deb --build pkg \
                "/workspace/plasma-applet-appgrid_${PKG_SUFFIX}_${CODENAME}_${DEB_ARCH}.deb"
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.distro.id }}-package-${{ matrix.arch.deb }}
          path: '*.deb'

  release:
    name: Create Release
    needs: [version, arch, fedora, deb-packages]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: List packages
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*
