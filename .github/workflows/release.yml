name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  BUILD_TYPE: Release

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      # Raw tag version (e.g. "1.8.0" or "1.8.0-rc.1") — fed to
      # APPGRID_VERSION_OVERRIDE so the binary self-reports the exact tag,
      # and to the universal tarball filename (which has no version-field
      # constraints). Keep the hyphen here.
      version: ${{ steps.version.outputs.version }}
      # RPM / Debian-safe pre-release version. RPM's Version: field forbids
      # hyphens; Debian convention sorts "1.8.0~rc.1" BEFORE "1.8.0" final.
      # Stable tags pass through unchanged ("1.8.0" → "1.8.0"); pre-release
      # tags swap "-" for "~" ("1.8.0-rc.1" → "1.8.0~rc.1") and drop the
      # "+<build>" suffix that semver allows but neither RPM nor Debian do.
      pkg_version: ${{ steps.version.outputs.pkg_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Determine version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(echo "$VERSION" | sed 's/-/~/g; s/+.*//')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "pkg_version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved: tag=v${VERSION}  rpm/deb pkg_version=${PKG_VERSION}"

  tests:
    name: Tests
    needs: version
    runs-on: ubuntu-latest
    container: archlinux:latest
    env:
      APP_VERSION: ${{ needs.version.outputs.version }}
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            base-devel git cmake extra-cmake-modules \
            qt6-base qt6-declarative \
            libplasma kpackage kio kservice ki18n kiconthemes ksvg \
            kconfig kcoreaddons kwindowsystem kglobalaccel krunner layer-shell-qt \
            plasma-activities plasma-activities-stats \
            plasma-workspace appstream-qt

      - name: Checkout
        uses: actions/checkout@v5

      - name: Mark workspace as safe (container uid mismatch)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build with tests + universal flag
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DBUILD_TESTING=ON -DAPPGRID_UNIVERSAL_BUILD=ON \
            -DAPPGRID_VERSION_OVERRIDE="$APP_VERSION"
          cmake --build build -j$(nproc)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  # Ubuntu + Fedora are published to the Launchpad PPA and Fedora COPR;
  # those services build the binaries for every series and architecture.
  # A plain "v1.2.3" tag → stable projects; "v1.2.3-rc.1" → the -rc projects.
  publish:
    name: Publish packages
    needs: [version, tests]
    uses: ./.github/workflows/publish.yml
    with:
      channel: ${{ contains(needs.version.outputs.version, '-') && 'rc' || 'stable' }}
      version: ${{ needs.version.outputs.version }}
      pkg_version: ${{ needs.version.outputs.pkg_version }}
    secrets: inherit

  universal:
    name: Universal package (${{ matrix.arch }})
    needs: [version, tests]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    env:
      APP_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build and package
        # Fedora 42 = oldest mainstream stable shipping Plasma libs at
        # SONAME 7 (KDE bumped from 6 around Plasma 6.4). Built here so the
        # tarball loads on KDE Linux / Kinoite / Bazzite / Aurora / Kalpa /
        # SteamOS / Arch / Tumbleweed. Excludes Plasma <= 6.3 users.
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v ${{ github.workspace }}:/workspace \
            -e APP_VERSION="${APP_VERSION}" \
            -e BUILD_TYPE="${BUILD_TYPE}" \
            -e ARCH="${{ matrix.arch }}" \
            fedora:42 bash -c '
              set -e
              dnf clean all
              dnf makecache --refresh
              dnf install -y \
                cmake extra-cmake-modules gcc-c++ make \
                qt6-qtbase-devel qt6-qtdeclarative-devel \
                libplasma-devel kf6-kpackage-devel kf6-kio-devel \
                kf6-kconfig-devel kf6-kservice-devel kf6-ki18n-devel kf6-kcoreaddons-devel \
                kf6-kiconthemes-devel kf6-ksvg-devel \
                kf6-kwindowsystem-devel kf6-kglobalaccel-devel kf6-krunner-devel layer-shell-qt-devel \
                plasma-activities-devel plasma-activities-stats-devel \
                plasma-workspace-devel \
                appstream-qt-devel \
                gettext
              test -f /usr/lib64/cmake/Qt6/Qt6Config.cmake \
                || { echo "ERROR: qt6-qtbase-devel install incomplete"; rpm -V qt6-qtbase-devel; exit 1; }
              cd /workspace
              # Pin plugin path + explicit Qt6_DIR (see build.yml note).
              cmake -B build -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
                  -DAPPGRID_UNIVERSAL_BUILD=ON \
                  -DQt6_DIR=/usr/lib64/cmake/Qt6 \
                  -DCMAKE_PREFIX_PATH=/usr/lib64/cmake \
                  -DKDE_INSTALL_QTPLUGINDIR=lib/qt6/plugins \
                  -DAPPGRID_VERSION_OVERRIDE="$APP_VERSION"
              cmake --build build -j$(nproc)
              mkdir -p out
              bash packaging/universal/build-package.sh \
                "$APP_VERSION" "$ARCH" build out
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: universal-package-${{ matrix.arch }}
          path: out/*

  release:
    name: Create Release
    needs: [version, universal]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: List packages
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          # Mark as pre-release when the tag is an rc / beta / alpha. The
          # website's stable / pre-release channel toggle keys off this flag
          # via GitHub's `prerelease` field.
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: |
            artifacts/*
