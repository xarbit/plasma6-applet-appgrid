name: Build Packages

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "screenshots/**"
      - ".gitignore"
      - "dev.xarbit.appgrid.metainfo.xml"
      - "PKGBUILD"
      - "packages/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "screenshots/**"
      - ".gitignore"
      - "dev.xarbit.appgrid.metainfo.xml"
      - "PKGBUILD"
      - "packages/**"

permissions:
  contents: write

env:
  BUILD_TYPE: Release

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      pkg_version: ${{ steps.version.outputs.pkg_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          BASE_VERSION=$(grep -oP 'project\(AppGrid VERSION \K[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            DEV_COUNT=$(git rev-list ${LAST_TAG}..HEAD --count)
          else
            DEV_COUNT=$(git rev-list HEAD --count)
          fi
          echo "version=${BASE_VERSION}-dev.${DEV_COUNT}" >> "$GITHUB_OUTPUT"
          echo "pkg_version=${BASE_VERSION}~dev.${DEV_COUNT}" >> "$GITHUB_OUTPUT"

  tests:
    name: Tests & Lint
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            base-devel git cmake extra-cmake-modules \
            qt6-base qt6-declarative \
            libplasma kpackage kio kservice ki18n \
            kcoreaddons kwindowsystem krunner layer-shell-qt plasma-activities \
            plasma-workspace appstream namcap \
            python-pip clang
          python3 -m pip install --break-system-packages codespell reuse

      - name: Checkout
        uses: actions/checkout@v5

      - name: Mark workspace as safe (container uid mismatch)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Check SPDX license headers
        run: |
          set -e
          files=$(git ls-files '*.cpp' '*.h' '*.qml' | \
            grep -v -E '^(package|package-panel)/contents/ui/DevFlags\.qml$')
          if [ -z "$files" ]; then
            echo "::error::git ls-files returned no files — repo state broken"
            exit 1
          fi
          missing=$(echo "$files" | while read f; do
            grep -L "SPDX-License-Identifier" "$f" || true
          done)
          if [ -n "$missing" ]; then
            echo "::error::Files missing SPDX-License-Identifier:"
            echo "$missing"
            exit 1
          fi
          echo "all tracked source files carry SPDX-License-Identifier ($(echo "$files" | wc -l) files)"

      - name: Check trailing whitespace
        run: |
          # Scan tracked source/doc files for trailing whitespace
          set -e
          files=$(git ls-files '*.cpp' '*.h' '*.qml' '*.xml' '*.json' '*.md' 'CMakeLists.txt')
          if [ -z "$files" ]; then
            echo "::error::git ls-files returned no files — repo state broken"
            exit 1
          fi
          bad=$(echo "$files" | xargs grep -nP '[ \t]+$' 2>/dev/null || true)
          if [ -n "$bad" ]; then
            echo "::error::Files with trailing whitespace:"
            echo "$bad"
            exit 1
          fi
          echo "no trailing whitespace found"

      - name: Spellcheck (codespell)
        run: |
          codespell \
            --skip='build*,*.po,*.pot,po,*.svg' \
            --ignore-words-list='growin' \
            --quiet-level=2 \
            src/ package/contents/ package-panel/contents/ tests/ README.md

      - name: REUSE compliance
        run: reuse lint || echo "::warning::REUSE lint failed — non-blocking"
        continue-on-error: true

      - name: Build (with tests)
        env:
          CC: clang
          CXX: clang++
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=$BUILD_TYPE -DCMAKE_INSTALL_PREFIX=/usr \
            -DBUILD_TESTING=ON -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          cmake --build build -j$(nproc)

      - name: clang-tidy
        run: |
          # Strip gcc-only flags that clang-tidy (clang-based) doesn't recognize
          sed -i 's/-mno-direct-extern-access//g' build/compile_commands.json
          # Run on our sources only; non-fatal initially.
          for src in src/appmodel.cpp src/appfiltermodel.cpp src/appgridplugin.cpp; do
            clang-tidy -p build "$src" \
              --quiet \
              --warnings-as-errors='' \
              --header-filter='src/.*' || true
          done

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build --output-on-failure

      - name: Validate AppStream metadata
        run: appstreamcli validate --no-net dev.xarbit.appgrid.metainfo.xml

      - name: Validate plasmoid packages
        run: |
          set -e
          mkdir -p /tmp/pkg-validate
          for pkg in package package-panel; do
            out=$(kpackagetool6 --type Plasma/Applet --install "$pkg" --packageroot /tmp/pkg-validate 2>&1)
            echo "$out"
            if echo "$out" | grep -qE "^Error:"; then
              echo "::error::kpackagetool6 reported error for $pkg"
              exit 1
            fi
          done

      - name: Validate translation files
        run: |
          set -e
          found=0
          while IFS= read -r f; do
            found=1
            msgfmt --check --output-file=/dev/null "$f"
          done < <(find po -name "*.po" -type f)
          if [ "$found" = "0" ]; then
            echo "no .po files to check"
          fi

      - name: Lint QML
        run: |
          /usr/lib/qt6/bin/qmllint -I /usr/lib/qt6/qml \
            package/contents/ui/*.qml \
            package/contents/ui/iconanims/*.qml \
            package/contents/ui/prefix/*.qml

      - name: Lint PKGBUILD
        run: namcap PKGBUILD

  arch:
    name: Arch Linux
    needs: [version, tests]
    runs-on: ubuntu-latest
    # x86_64 only — no official Arch Linux ARM container
    container: archlinux:latest
    env:
      APP_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            base-devel git cmake extra-cmake-modules \
            qt6-base qt6-declarative \
            libplasma kpackage kio kservice ki18n \
            kcoreaddons kwindowsystem krunner layer-shell-qt plasma-activities \
            plasma-workspace

      - name: Checkout
        uses: actions/checkout@v5

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=$BUILD_TYPE -DCMAKE_INSTALL_PREFIX=/usr \
            -DAPPGRID_VERSION_OVERRIDE="$APP_VERSION"
          cmake --build build -j$(nproc)

      - name: Package
        run: |
          DESTDIR="$PWD/pkg" cmake --install build
          cd pkg
          tar czf ../plasma6-applets-appgrid-${APP_VERSION}-1-arch-x86_64.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: arch-package
          path: plasma6-applets-appgrid-*.tar.gz

  fedora:
    name: Fedora (${{ matrix.arch }})
    needs: [version, tests]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    env:
      APP_VERSION: ${{ needs.version.outputs.version }}
      PKG_VERSION: ${{ needs.version.outputs.pkg_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build and package
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v ${{ github.workspace }}:/workspace \
            -e APP_VERSION="${APP_VERSION}" \
            -e PKG_VERSION="${PKG_VERSION}" \
            -e BUILD_TYPE="${BUILD_TYPE}" \
            fedora:latest bash -c '
              set -e
              dnf install -y \
                cmake extra-cmake-modules gcc-c++ \
                qt6-qtbase-devel qt6-qtdeclarative-devel \
                libplasma-devel kf6-kpackage-devel kf6-kio-devel \
                kf6-kservice-devel kf6-ki18n-devel kf6-kcoreaddons-devel \
                kf6-kwindowsystem-devel kf6-krunner-devel layer-shell-qt-devel \
                plasma-activities-devel plasma-workspace-devel \
                gettext rpm-build
              cd /workspace
              cmake -B build -DCMAKE_BUILD_TYPE=$BUILD_TYPE -DCMAKE_INSTALL_PREFIX=/usr \
                -DAPPGRID_VERSION_OVERRIDE="$APP_VERSION"
              cmake --build build -j$(nproc)
              DESTDIR="$PWD/pkg" cmake --install build
              export DISTRO_VER=$(rpm -E %fedora)
              export PKG_DIR="$PWD/pkg"
              export PKG_VERSION
              envsubst < packages/rpm/fedora.spec.in > appgrid.spec
              rpmbuild -bb \
                --define "_topdir $PWD/rpmbuild" \
                appgrid.spec
              find rpmbuild/RPMS -name "*.rpm" -exec cp {} /workspace/ \;
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: fedora-package-${{ matrix.arch }}
          path: "*.rpm"

  openmandriva:
    name: OpenMandriva (${{ matrix.arch }})
    needs: [version, tests]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    env:
      APP_VERSION: ${{ needs.version.outputs.version }}
      PKG_VERSION: ${{ needs.version.outputs.pkg_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build and package
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v ${{ github.workspace }}:/workspace \
            -e APP_VERSION="${APP_VERSION}" \
            -e PKG_VERSION="${PKG_VERSION}" \
            -e BUILD_TYPE="${BUILD_TYPE}" \
            docker.io/openmandriva/cooker bash -c '
              set -e
              dnf install -y \
                cmake extra-cmake-modules gcc-c++ \
                lib64Qt6Core-devel lib64Qt6Gui-devel lib64Qt6Quick-devel \
                lib64Qt6Qml-devel lib64Qt6Network-devel lib64Qt6DBus-devel \
                lib64Plasma-devel lib64PlasmaActivities-devel \
                lib64plasma-workspace-devel \
                lib64KF6Package-devel lib64KF6KIO-devel lib64KF6Service-devel \
                lib64KF6I18n-devel lib64KF6CoreAddons-devel \
                lib64KF6WindowSystem-devel lib64KF6Runner-devel \
                lib64LayerShellQtInterface-devel \
                gettext rpm-build
              cd /workspace
              cmake -B build -DCMAKE_BUILD_TYPE=$BUILD_TYPE -DCMAKE_INSTALL_PREFIX=/usr \
                -DAPPGRID_VERSION_OVERRIDE="$APP_VERSION"
              cmake --build build -j$(nproc)
              DESTDIR="$PWD/pkg" cmake --install build
              export DISTRO_VER=$(grep -oP "VERSION_ID=\"\K[^\"]+" /etc/os-release)
              export PKG_DIR="$PWD/pkg"
              export PKG_VERSION
              envsubst < packages/rpm/openmandriva.spec.in > appgrid.spec
              rpmbuild -bb \
                --define "_topdir $PWD/rpmbuild" \
                appgrid.spec
              find rpmbuild/RPMS -name "*.rpm" -exec cp {} /workspace/ \;
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: openmandriva-package-${{ matrix.arch }}
          path: "*.rpm"

  deb-packages:
    name: ${{ matrix.distro.name }} (${{ matrix.arch.name }})
    needs: [version, tests]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - { name: "Ubuntu 25.04", image: "ubuntu:25.04", id: "ubuntu-25.04" }
          - { name: "Ubuntu 25.10", image: "ubuntu:25.10", id: "ubuntu-25.10" }
          - { name: "Ubuntu 26.04", image: "ubuntu:26.04", id: "ubuntu-26.04" }
          - { name: "Debian 13", image: "debian:13", id: "debian-13" }
        arch:
          - { name: "x86_64", platform: "linux/amd64", deb: "amd64" }
          - { name: "aarch64", platform: "linux/arm64", deb: "arm64" }
    env:
      APP_VERSION: ${{ needs.version.outputs.version }}
      PKG_VERSION: ${{ needs.version.outputs.pkg_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        if: matrix.arch.name == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build and package
        env:
          DEB_ARCH: ${{ matrix.arch.deb }}
        run: |
          docker run --rm --platform ${{ matrix.arch.platform }} \
            -v ${{ github.workspace }}:/workspace \
            -e APP_VERSION="${APP_VERSION}" \
            -e PKG_VERSION="${PKG_VERSION}" \
            -e BUILD_TYPE="${BUILD_TYPE}" \
            -e DEB_ARCH="${DEB_ARCH}" \
            -e DEBIAN_FRONTEND=noninteractive \
            ${{ matrix.distro.image }} bash -c '
              set -e
              apt-get update
              apt-get install -y \
                cmake extra-cmake-modules g++ \
                qt6-base-dev qt6-declarative-dev \
                libplasma-dev libkf6package-dev libkf6kio-dev \
                libkf6service-dev libkf6i18n-dev libkf6coreaddons-dev \
                libkf6windowsystem-dev libkf6runner-dev \
                libplasmaactivities-dev \
                liblayershellqtinterface-dev \
                plasma-workspace-dev \
                gettext dpkg-dev
              cd /workspace
              cmake -B build -DCMAKE_BUILD_TYPE=$BUILD_TYPE -DCMAKE_INSTALL_PREFIX=/usr \
                -DAPPGRID_VERSION_OVERRIDE="$APP_VERSION"
              cmake --build build -j$(nproc)
              DESTDIR="$PWD/pkg" cmake --install build
              mkdir -p pkg/DEBIAN
              DISTRO_ID=$(grep -oP "^ID=\K\w+" /etc/os-release)
              VER_ID=$(grep -oP "VERSION_ID=\"\K[^\"]+" /etc/os-release)
              CODENAME=$(grep -oP "VERSION_CODENAME=\K.*" /etc/os-release)
              if [ "$DISTRO_ID" = "ubuntu" ]; then
                export PKG_SUFFIX="${PKG_VERSION}-1ubuntu${VER_ID}"
              else
                export PKG_SUFFIX="${PKG_VERSION}-1${DISTRO_ID}${VER_ID}"
              fi
              export DEB_ARCH
              envsubst < packages/deb/control.in > pkg/DEBIAN/control
              dpkg-deb --build pkg \
                "/workspace/plasma-applet-appgrid_${PKG_SUFFIX}_${CODENAME}_${DEB_ARCH}.deb"
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.distro.id }}-package-${{ matrix.arch.deb }}
          path: "*.deb"

  universal:
    name: Universal package (${{ matrix.arch }})
    needs: [version, tests]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    env:
      APP_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build and package
        # Build inside Debian 13 (trixie) rather than archlinux:latest. We
        # anchor the universal tarball on the oldest distro in our matrix
        # that still ships Plasma 6 so the resulting .so works on every
        # newer-or-equal target (glibc / libstdc++ / Qt / KF6 forward-
        # compat). Building on Arch produces a binary that runs on Arch
        # and KDE Linux but ldd-fails on Fedora N-1, Debian stable, etc.
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v ${{ github.workspace }}:/workspace \
            -e APP_VERSION="${APP_VERSION}" \
            -e BUILD_TYPE="${BUILD_TYPE}" \
            -e ARCH="${{ matrix.arch }}" \
            -e DEBIAN_FRONTEND=noninteractive \
            debian:13 bash -c '
              set -e
              apt-get update
              apt-get install -y \
                cmake extra-cmake-modules g++ \
                qt6-base-dev qt6-declarative-dev \
                libplasma-dev libkf6package-dev libkf6kio-dev \
                libkf6service-dev libkf6i18n-dev libkf6coreaddons-dev \
                libkf6windowsystem-dev libkf6runner-dev \
                libplasmaactivities-dev \
                liblayershellqtinterface-dev \
                plasma-workspace-dev \
                gettext
              cd /workspace
              cmake -B build -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
                  -DAPPGRID_UNIVERSAL_BUILD=ON \
                  -DAPPGRID_VERSION_OVERRIDE="$APP_VERSION"
              cmake --build build -j$(nproc)
              mkdir -p out
              bash packages/universal/build-package.sh \
                "$APP_VERSION" "$ARCH" build out
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: universal-package-${{ matrix.arch }}
          path: out/*

  dev-release:
    name: Update Development Release
    needs: [version, arch, fedora, deb-packages, universal]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: List packages
        run: find artifacts -type f | sort

      - name: Delete previous dev release
        run: gh release delete latest --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

      - name: Create development release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Development Build v${{ needs.version.outputs.version }}"
          prerelease: true
          body: |
            **Latest development build from `main` branch.**

            Version: `${{ needs.version.outputs.version }}`
            Commit: `${{ github.sha }}`

            > ⚠️ This is an automated pre-release build. It may contain bugs or incomplete features. For stable releases, see the [latest release](https://github.com/${{ github.repository }}/releases/latest).
          files: |
            artifacts/*
