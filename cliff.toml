# git-cliff configuration. Renders CHANGELOG.md from Conventional-Commit
# messages — see https://git-cliff.org for the full reference.

[changelog]
header = """
# Changelog

All notable changes to AppGrid are documented here.\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}{{ commit.message | upper_first }}\
{% if commit.remote.pr_number %} (#{{ commit.remote.pr_number }}){% endif %}\
{% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
    # Internal-scope commits — skipped even when typed as fix/feat/perf.
    # `fix(ci):` etc. would otherwise match `^fix` below and surface in
    # the user-facing Fixed section. Order matters: cliff takes the
    # first match, so this MUST precede the user-facing rules.
    { message = '^(fix|feat|perf|revert)\((ci|build|test|docs|chore|deps|packaging)\)', skip = true },
    # User-facing — kept (Keep a Changelog convention).
    { message = "^feat",     group = "Added" },
    { message = "^fix",      group = "Fixed" },
    { message = "^perf",     group = "Performance" },
    { message = "^revert",   group = "Reverted" },
    # Internal churn — skipped. Live in git log instead. Promote a
    # refactor/polish to feat:/fix: when it had user-visible impact.
    { message = "^refactor", skip = true },
    { message = "^polish",   skip = true },
    { message = "^docs",     skip = true },
    { message = "^build",    skip = true },
    { message = "^ci",       skip = true },
    { message = "^chore",    skip = true },
    { message = "^test",     skip = true },
    { message = "^style",    skip = true },
    { message = "^Merge",    skip = true },
]
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]*"
# Hide rc tags whose stable already shipped — keeps the changelog
# from accumulating rc.1 / rc.2 / rc.3 entries for past versions
# while leaving the CURRENT rc cycle's tag visible. Extend this
# pattern (`|^v1\.9\.0-rc\.`) once 1.9.0 stable ships.
skip_tags = "^v1\\.8\\.0-rc\\."
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
